<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connexion · Zone 5R ODGAM</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
  :root {
    --green: #1D9E75; --green-l: #E1F5EE; --green-d: #085041;
    --amber: #BA7517; --amber-d: #412402;
    --red: #A32D2D; --red-l: #FCEBEB;
    --text: #1a1a18; --muted: #6b6a65;
    --radius: 14px; --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh;
    background: linear-gradient(145deg, #063528 0%, #0b5940 40%, #1D9E75 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
  }

  .login-wrap {
    width: 100%;
    max-width: 400px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
  }

  /* ── Branding ── */
  .brand {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    color: #fff;
  }
  .brand-logo {
    width: 220px; height: 220px;
    border-radius: 50%;
    background: #fff;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 6px 28px rgba(0,0,0,0.4);
    overflow: hidden;
  }
  .brand-logo img { width: 145%; height: 145%; object-fit: contain; transform: translateX(-5px); }
  .brand-name {
    font-size: 20px; font-weight: 800; letter-spacing: 0.2px;
    text-align: center; line-height: 1.5;
  }
  .brand-name span { display: block; }
  .brand-name .line1 { font-size: 17px; }
  .brand-name .line2 { font-size: 17px; }
  .brand-name .line3 { font-size: 13px; font-weight: 600; opacity: 0.75; margin-top: 2px; }

  /* ── Card ── */
  .card {
    width: 100%;
    background: #fff;
    border-radius: var(--radius);
    padding: 32px 28px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.25);
  }
  .card-title {
    font-size: 17px; font-weight: 700; color: var(--text);
    margin-bottom: 4px;
    display: flex; align-items: center; gap: 8px;
  }
  .card-title i { color: var(--green); font-size: 15px; }
  .card-sub {
    font-size: 12px; color: var(--muted);
    margin-bottom: 24px;
  }

  /* ── Form ── */
  .form-group { margin-bottom: 16px; }
  .form-group label {
    display: block; font-size: 12px; font-weight: 600;
    color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.4px;
  }
  .input-wrap {
    position: relative;
  }
  .input-wrap > i {
    position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
    color: var(--muted); font-size: 14px; pointer-events: none;
  }
  .input-wrap input {
    width: 100%; padding: 11px 12px 11px 36px;
    border: 1.5px solid #d1d5db; border-radius: var(--radius-sm);
    font-size: 14px; color: var(--text);
    background: #fafafa;
    outline: none; transition: border-color 0.15s, background 0.15s;
  }
  .input-wrap input:focus {
    border-color: var(--green); background: #fff;
    box-shadow: 0 0 0 3px rgba(29,158,117,0.12);
  }
  .pwd-toggle {
    position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
    background: none; border: none; cursor: pointer;
    color: var(--muted); font-size: 14px; padding: 4px;
    pointer-events: auto;
  }
  .pwd-toggle:hover { color: var(--green); }

  /* ── Error ── */
  .error-msg {
    background: var(--red-l); color: var(--red);
    border: 1px solid rgba(163,45,45,0.2);
    padding: 10px 14px; border-radius: var(--radius-sm);
    font-size: 12px; font-weight: 500;
    margin-bottom: 16px;
    display: none; align-items: center; gap: 8px;
  }
  .error-msg.show { display: flex; }

  /* ── Submit button ── */
  .btn-login {
    width: 100%; padding: 13px;
    background: var(--green); color: #fff;
    border: none; border-radius: var(--radius-sm);
    font-size: 14px; font-weight: 600;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    transition: background 0.15s, transform 0.1s;
    margin-top: 4px;
  }
  .btn-login:hover:not(:disabled) { background: #168a64; }
  .btn-login:active:not(:disabled) { transform: scale(0.98); }
  .btn-login:disabled { opacity: 0.6; cursor: default; }

  /* ── Loading spinner ── */
  .spinner {
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: none;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Back link ── */
  .back-link {
    color: rgba(255,255,255,0.65); font-size: 12px;
    text-decoration: none; display: flex; align-items: center; gap: 6px;
    transition: color 0.15s;
  }
  .back-link:hover { color: #fff; }

  /* ── Footer ── */
  .footer-note {
    font-size: 11px; color: rgba(255,255,255,0.5); text-align: center;
  }

  @media (max-width: 420px) {
    .card { padding: 24px 18px; }
    .brand-logo { width: 90px; height: 90px; }
    .brand-name .line1, .brand-name .line2 { font-size: 15px; }
    .brand-name .line3 { font-size: 12px; }
  }
</style>
</head>
<body>

<div class="login-wrap">

  <!-- Branding -->
  <div class="brand">
    <div class="brand-logo"><img src="assets/logo.png" alt="Zone 5R ODGAM"></div>
    <div class="brand-name">
      <span class="line1">ORGAM de Ziguinchor</span>
      <span class="line2">ODGAM de Bignona</span>
      <span class="line3">Membre de la ZONE 5R</span>
    </div>
  </div>

  <!-- Formulaire -->
  <div class="card">
    <div class="card-title">
      <i class="fa-solid fa-lock"></i>
      Espace membres
    </div>
    <p class="card-sub">Connectez-vous pour accéder aux fonctions du bureau.</p>

    <div class="error-msg" id="login-error">
      <i class="fa-solid fa-circle-xmark"></i>
      <span id="error-text">Identifiant ou mot de passe incorrect.</span>
    </div>

    <div class="form-group">
      <label>Identifiant</label>
      <div class="input-wrap">
        <i class="fa-solid fa-user"></i>
        <input type="text" id="login-username" placeholder="ex : aliou.sagna"
               autocomplete="username" autofocus
               onkeydown="if(event.key==='Enter') document.getElementById('login-password').focus()">
      </div>
    </div>

    <div class="form-group">
      <label>Mot de passe</label>
      <div class="input-wrap">
        <i class="fa-solid fa-key"></i>
        <input type="password" id="login-password" placeholder="••••••••"
               autocomplete="current-password"
               onkeydown="if(event.key==='Enter') doLogin()">
        <button class="pwd-toggle" type="button" id="pwd-toggle" onclick="togglePwd()" tabindex="-1">
          <i class="fa-solid fa-eye" id="pwd-icon"></i>
        </button>
      </div>
    </div>

    <button class="btn-login" id="btn-login" onclick="doLogin()">
      <div class="spinner" id="spinner"></div>
      <i class="fa-solid fa-arrow-right-to-bracket" id="btn-icon"></i>
      <span id="btn-text">Se connecter</span>
    </button>
  </div>

  <!-- Retour visiteur -->
  <a href="Zone-5R.html" class="back-link" onclick="sessionStorage.setItem('z5r_visitor','1')">
    <i class="fa-solid fa-chevron-left"></i>
    Accès visiteur (sans connexion)
  </a>

  <div class="footer-note">Accès réservé aux membres du Bureau de la ZONE 5R · Identifiants fournis par l'administrateur</div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script>
const _AUTH_SUFFIX = '@zone5r.app';

firebase.initializeApp({
  apiKey:            'AIzaSyAf4rYCVwRISriNK57kq6PxUCLAffxbRYo',
  authDomain:        'z5rb-a8286.firebaseapp.com',
  projectId:         'z5rb-a8286',
  storageBucket:     'z5rb-a8286.firebasestorage.app',
  messagingSenderId: '156095222819',
  appId:             '1:156095222819:web:2e914f0377a76dfa5c4d96'
});
const _db  = firebase.firestore();
const _COL = 'zone5r';

// Redirect already-authenticated users immediately
firebase.auth().onAuthStateChanged(fbUser => {
  if (fbUser && !fbUser.isAnonymous) {
    window.location.replace('Zone-5R.html');
  }
});

// ── UI helpers ────────────────────────────────────────────────
function setLoading(on) {
  const btn  = document.getElementById('btn-login');
  const spin = document.getElementById('spinner');
  const icon = document.getElementById('btn-icon');
  const txt  = document.getElementById('btn-text');
  btn.disabled = on;
  spin.style.display = on ? 'block' : 'none';
  icon.style.display = on ? 'none' : '';
  txt.textContent    = on ? 'Vérification…' : 'Se connecter';
}

function showError(msg) {
  document.getElementById('error-text').textContent = msg || 'Identifiant ou mot de passe incorrect.';
  document.getElementById('login-error').classList.add('show');
}

function hideError() {
  document.getElementById('login-error').classList.remove('show');
}

function togglePwd() {
  const input = document.getElementById('login-password');
  const icon  = document.getElementById('pwd-icon');
  const show  = input.type === 'password';
  input.type     = show ? 'text' : 'password';
  icon.className = show ? 'fa-solid fa-eye-slash' : 'fa-solid fa-eye';
}

// ── Brute-force protection ────────────────────────────────────
let _loginAttempts = 0;
let _loginLocked   = false;

function _lockLogin(seconds) {
  _loginLocked = true;
  const btn = document.getElementById('btn-login');
  const txt = document.getElementById('btn-text');
  let remaining = seconds;
  txt.textContent = `Réessayer dans ${remaining}s`;
  btn.disabled = true;
  const iv = setInterval(() => {
    remaining--;
    if (remaining <= 0) {
      clearInterval(iv);
      _loginLocked = false;
      btn.disabled = false;
      txt.textContent = 'Se connecter';
    } else {
      txt.textContent = `Réessayer dans ${remaining}s`;
    }
  }, 1000);
}

// ── Session helpers ───────────────────────────────────────────
function _saveSession(username, profile) {
  const user = { username, ...profile };
  delete user.password;
  localStorage.setItem('zone5r_session', JSON.stringify(user));
  localStorage.setItem('zone5r_login_toast', user.name.split(' ')[0]);
  try {
    const log = JSON.parse(localStorage.getItem('zone5r_auditlog') || '[]');
    log.unshift({ id: 'A' + Date.now(), ts: new Date().toISOString(),
      username: user.username, name: user.name, role: user.role,
      action: 'LOGIN', detail: 'Connexion depuis ' + (navigator.platform || 'inconnu') });
    localStorage.setItem('zone5r_auditlog', JSON.stringify(log.slice(0, 1000)));
  } catch(e) {}
}

// ── Firestore migration fallback ──────────────────────────────
// Returns profile if username/password match a Firestore record that
// still has a temporary password field (set by admin during reset).
async function _tryFirestoreFallback(username, password) {
  try {
    const snap = await _db.collection(_COL).doc('users').get();
    if (!snap.exists) return null;
    const profiles = snap.data().data || {};
    const profile  = profiles[username];
    if (!profile || profile.password !== password) return null;
    return profile;
  } catch(e) { return null; }
}

// Auto-create Firebase Auth account and clear temp password from Firestore
async function _migrateToFirebase(username, password) {
  try {
    await firebase.auth().createUserWithEmailAndPassword(username + _AUTH_SUFFIX, password);
  } catch(e) {
    if (e.code !== 'auth/email-already-in-use') return false;
  }
  // Remove the temp password from Firestore now that Firebase Auth is ready
  try {
    const snap = await _db.collection(_COL).doc('users').get();
    if (snap.exists) {
      const data = snap.data().data || {};
      if (data[username]?.password) {
        delete data[username].password;
        await _db.collection(_COL).doc('users').update({ data });
      }
    }
  } catch(e) {}
  return true;
}

// ── Main login ────────────────────────────────────────────────
async function doLogin() {
  if (_loginLocked) return;
  hideError();

  const username = document.getElementById('login-username').value.trim().toLowerCase();
  const password = document.getElementById('login-password').value;

  if (!username || !password) {
    showError('Veuillez renseigner votre identifiant et mot de passe.');
    return;
  }

  setLoading(true);

  // 1. Try Firebase Auth (primary, fast path)
  try {
    await firebase.auth().signInWithEmailAndPassword(username + _AUTH_SUFFIX, password);
    // onAuthStateChanged will redirect — get profile from localStorage/Firestore
    const stored = localStorage.getItem('zone5r_users');
    const profiles = stored ? JSON.parse(stored) : {};
    const profile = profiles[username] || { role: 'visiteur', name: username, poste: '' };
    _saveSession(username, profile);
    _loginAttempts = 0;
    window.location.replace('Zone-5R.html');
    return;
  } catch(fbErr) {
    const isCredentialError = ['auth/wrong-password', 'auth/user-not-found',
      'auth/invalid-credential', 'auth/invalid-login-credentials'].includes(fbErr.code);
    if (!isCredentialError) {
      setLoading(false);
      showError('Erreur de connexion. Veuillez réessayer.');
      return;
    }
  }

  // 2. Firestore migration fallback (for accounts not yet in Firebase Auth)
  const profile = await _tryFirestoreFallback(username, password);
  if (profile) {
    const migrated = await _migrateToFirebase(username, password);
    if (migrated) {
      try {
        await firebase.auth().signInWithEmailAndPassword(username + _AUTH_SUFFIX, password);
      } catch(e) {}
    }
    _saveSession(username, profile);
    _loginAttempts = 0;
    setLoading(false);
    window.location.replace('Zone-5R.html');
    return;
  }

  // 3. Invalid credentials
  setLoading(false);
  document.getElementById('login-password').value = '';
  _loginAttempts++;
  if (_loginAttempts >= 10) {
    showError('Trop de tentatives. Veuillez contacter l\'administrateur.');
    _lockLogin(60);
  } else {
    const delay = Math.min(_loginAttempts * 3, 15);
    showError('Identifiant ou mot de passe incorrect.' +
      (_loginAttempts >= 3 ? ` (${_loginAttempts} tentatives)` : ''));
    if (_loginAttempts >= 3) _lockLogin(delay);
  }
}
</script>
</body>
</html>
